name: build

on:
  push:
    branches: [main, feature/**]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Build Tailwind CSS
        run: npm run build:css
      - name: Restore
        run: dotnet restore PortfolioSite.sln
      - name: Build
        run: dotnet build PortfolioSite.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test PortfolioSite.sln --no-build --configuration Release --verbosity normal
