<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main class="app">
      <h1>Tic Tac Toe</h1>
      <p id="status" class="status" aria-live="polite">あなたのターン (O)</p>
      <p id="win-count" class="meta">Win Count: 0</p>
      <p id="ai-time" class="meta">AI Think: -</p>

      <section id="board" class="board" aria-label="3x3 board"></section>

      <button id="reset" class="reset" type="button">New Game</button>
    </main>

    <script src="src/game.js"></script>
    <script src="src/ai.js"></script>
    <script src="src/ui.js"></script>
    <script src="src/index.js"></script>
  </body>
</html>
